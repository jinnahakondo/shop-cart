<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              soft: '0 10px 30px rgba(15, 23, 42, 0.08)',
            },
          },
        },
      };
    </script>
  </head>
  <body class="">
    <main class="">


      <div class="grid gap-6 lg:grid-cols-[minmax(0,1.7fr)_minmax(320px,0.9fr)]">
        <!-- Cart items -->
      

        <!-- Summary -->
        <aside class="h-fit rounded-3xl bg-white p-6 shadow-soft ring-1 ring-slate-200">
          <h2 class="text-xl font-semibold text-slate-900">Order Summary</h2>
          <p class="mt-1 text-sm text-slate-500">Derived values from the cart state</p>

          <div class="mt-6 space-y-4">
            <div class="flex items-center justify-between text-sm">
              <span class="text-slate-500">Subtotal</span>
              <span class="font-medium text-slate-900">$265.00</span>
            </div>
            <div class="flex items-center justify-between text-sm">
              <span class="text-slate-500">Tax (5%)</span>
              <span class="font-medium text-slate-900">$13.25</span>
            </div>
            <div class="flex items-center justify-between text-sm">
              <span class="text-slate-500">Shipping</span>
              <span class="font-medium text-slate-900">$10.00</span>
            </div>

            <div class="border-t border-slate-200 pt-4">
              <div class="flex items-center justify-between">
                <span class="text-base font-semibold text-slate-900">Total</span>
                <span class="text-2xl font-bold text-slate-900">$288.25</span>
              </div>
            </div>

            <button class="w-full rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white hover:bg-indigo-500">
              Proceed to Checkout
            </button>

            <button class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50">
              Apply Coupon
            </button>
          </div>

          <div class="mt-6 rounded-2xl bg-slate-50 p-4">
            <p class="text-sm font-medium text-slate-900">Assignment note</p>
            <p class="mt-1 text-sm text-slate-600">
              Replace the static data with <code class="rounded bg-white px-1.5 py-0.5 text-xs">useReducer</code> state and wire the buttons to actions.
            </p>
          </div>
        </aside>
      </div>
    </main>
  </body>
</html>
